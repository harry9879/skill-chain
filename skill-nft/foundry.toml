[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
verbosity = 2
 
[profile.default.fuzz]
runs = 1000
max_test_rejects = 65536
 
[profile.ci]
fuzz = { runs = 5000 }
 
[rpc_endpoints]
localhost     = "http://127.0.0.1:8545"
mumbai        = "${POLYGON_MUMBAI_RPC}"
polygon       = "${POLYGON_RPC}"
 
[etherscan]
mumbai  = { key = "${POLYGONSCAN_API_KEY}", url = "https://api-testnet.polygonscan.com/api" }
polygon = { key = "${POLYGONSCAN_API_KEY}", url = "https://api.polygonscan.com/api" }
 